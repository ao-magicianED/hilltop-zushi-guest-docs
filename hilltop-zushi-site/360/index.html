<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hilltop Zushi｜360°バーチャル内見</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.js"></script>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #16291f; color: #fff; }
  body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif; display: flex; flex-direction: column; }

  header {
    padding: 0.9rem 1.5rem;
    background: linear-gradient(160deg, #1F3A34 0%, #16291f 100%);
    border-bottom: 1px solid rgba(201,165,109,0.25);
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header .brand { font-family: "Cormorant Garamond", "Noto Serif JP", serif; font-size: 1.25rem; font-weight: 600; letter-spacing: .04em; }
  header h1 { margin: 0; font-size: 1.05rem; font-weight: 600; color: #C9A56D; }
  header p { margin: 0; font-size: 0.8rem; opacity: 0.8; }
  header a.back { margin-left: auto; font-size: 0.8rem; color: rgba(255,255,255,.8); text-decoration: none; border: 1px solid rgba(255,255,255,.3); padding: .35rem .9rem; border-radius: 30px; }
  header a.back:hover { color: #fff; border-color: #C9A56D; }

  #viewer {
    flex: 1;
    min-height: 0;
    width: 100%;
    background: #000;
  }

  .gallery {
    flex-shrink: 0;
    display: flex;
    gap: 0.5rem;
    padding: 0.7rem 1rem;
    overflow-x: auto;
    background: rgba(0,0,0,0.65);
    border-top: 1px solid rgba(255,255,255,0.08);
    scrollbar-width: thin;
  }
  .gallery::-webkit-scrollbar { height: 8px; }
  .gallery::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 4px; }

  .thumb {
    flex: 0 0 auto;
    width: 140px;
    height: 70px;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    position: relative;
    transition: transform 0.15s ease, border-color 0.15s ease;
    background: #222;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .label {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 2px 6px;
    font-size: 0.7rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    text-align: left;
  }
  .thumb:hover { transform: translateY(-2px); }
  .thumb.active { border-color: #C9A56D; box-shadow: 0 0 0 2px rgba(201,165,109,0.3); }

  @media (max-width: 600px) {
    header .brand { font-size: 1.05rem; }
    header h1 { font-size: 0.92rem; }
    header p { font-size: 0.68rem; width: 100%; }
    .thumb { width: 110px; height: 55px; }
  }
</style>
</head>
<body>

<header>
  <span class="brand">Hilltop Zushi</span>
  <h1>360°バーチャル内見</h1>
  <p>ドラッグで見渡す／下のサムネイルで部屋を切替</p>
  <a class="back" href="../index.html">← サイトに戻る</a>
</header>

<div id="viewer"></div>

<div class="gallery" id="gallery"></div>

<script>
  const photos = [
    { file: 'R0011162', name: '玄関・廊下' },
    { file: 'R0011156', name: '和室リビング' },
    { file: 'R0011160', name: 'キッチン' },
    { file: 'R0011161', name: '寝室A（キング）' },
    { file: 'R0011163', name: '寝室B（ツイン）' },
    { file: 'R0011165', name: '寝室C（和室）' },
    { file: 'R0011157', name: 'キッズルーム' },
    { file: 'R0011158', name: '洗面・脱衣所' },
    { file: 'R0011159', name: '浴室' },
    { file: 'R0011164', name: 'トイレ' }
  ];

  let viewer = null;
  let currentIndex = 0;

  function loadPanorama(index) {
    currentIndex = index;
    const p = photos[index];
    const ext = p.ext || 'JPG';

    if (viewer) {
      viewer.destroy();
    }
    viewer = pannellum.viewer('viewer', {
      type: 'equirectangular',
      panorama: p.file + '.' + ext,
      autoLoad: true,
      autoRotate: -2,
      compass: false,
      showFullscreenCtrl: true,
      showZoomCtrl: true,
      mouseZoom: true,
      hfov: 100,
      minHfov: 50,
      maxHfov: 120,
      hotSpotDebug: false,
    });

    document.querySelectorAll('.thumb').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });
  }

  const gallery = document.getElementById('gallery');
  photos.forEach((p, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'thumb' + (i === 0 ? ' active' : '');
    thumb.innerHTML = `
      <img src="thumbs/${p.file}_thumb.jpg" alt="${p.name}" loading="lazy">
      <span class="label">${p.name}</span>
    `;
    thumb.addEventListener('click', () => loadPanorama(i));
    gallery.appendChild(thumb);
  });

  loadPanorama(0);
</script>

</body>
</html>
